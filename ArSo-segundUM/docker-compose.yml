services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: "segundum.usuarios"

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  usuarios:
    build: ./microservicio-usuarios
    container_name: usuarios
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - rabbitmq
    restart: on-failure

  productos:
    build: ./microservicio-productos
    container_name: productos
    ports:
      - "8080:8080"
    environment:
      - "SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/segundum.productos?createDatabaseIfNotExist=true"
      - "SPRING_DATASOURCE_USERNAME=root"
      - "SPRING_DATASOURCE_PASSWORD=root"
    depends_on:
      - mysql
    restart: on-failure

  compraventas:
    build: ./microservicio-compraventas
    container_name: compraventas
    ports:
      - "8081:8081"
    environment:
      - "SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/compraventas_db"
      - "SPRING_RABBITMQ_HOST=rabbitmq"
    depends_on:
      - mongodb
      - rabbitmq
    restart: on-failure

  pasarela:
    build: ./pasarela
    container_name: pasarela
    ports:
      - "8090:8090"
    environment:
      - "ZUUL_ROUTES_PRODUCTOS_URL=http://productos:8080"
      - "ZUUL_ROUTES_USUARIOS_URL=http://usuarios:8082"
      - "ZUUL_ROUTES_COMPRAVENTAS_URL=http://compraventas:8081"
      - "SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITHUB_CLIENTID=Ov23li1l5u6GwOWnVeyu"
      - "SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITHUB_CLIENTSECRET=fc9bb470683b91670f566150d30dcd8bb3436bab"
    depends_on:
      - usuarios
      - productos
      - compraventas
    restart: on-failure